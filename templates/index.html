<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prédiction Arrêts Engins</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        select, input[type="datetime-local"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #3498db; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #2980b9; }
        .result { margin-top: 20px; padding: 15px; background-color: #e8f8f5; border-left: 4px solid #1abc9c; font-size: 18px; }
        .error { margin-top: 20px; padding: 15px; background-color: #fdedec; border-left: 4px solid #e74c3c; color: #c0392b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Prédiction Durée d'Arrêt</h1>
        
        {% if error %}
        <div class="error">
            <strong>Erreur:</strong> {{ error }}
        </div>
        {% endif %}

        <form action="/predict" method="post">
            <div class="form-group">
                <label for="engin">Engin :</label>
                <select name="engin" id="engin" required>
                    {% for e in engins %}
                        <option value="{{ e }}" {% if e == selected_engin %}selected{% endif %}>{{ e }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label for="type">Type d'arrêt :</label>
                <select name="type" id="type" required>
                    {% for t in types %}
                        <option value="{{ t }}" {% if t == selected_type %}selected{% endif %}>{{ t }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="categorie">Catégorie :</label>
                <select name="categorie" id="categorie" required>
                    {% for c in categories %}
                        <option value="{{ c }}" {% if c == selected_categorie %}selected{% endif %}>{{ c }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="debut_arret">Date et Heure du Début d'Arrêt :</label>
                <input type="datetime-local" id="debut_arret" name="debut_arret" value="{{ selected_date if selected_date else '' }}" required>
            </div>

            <button type="submit">Prédire la Durée</button>
        </form>

        {% if result %}
        <div class="result">
            <strong>Durée estimée :</strong> {{ result }}
        </div>
        {% endif %}
    </div>
</body>
</html>
